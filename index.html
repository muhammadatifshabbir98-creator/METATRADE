<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaTrade Global | Trade Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-[#05070a] text-gray-200 min-h-screen font-sans">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-[#05070a] z-50 flex flex-col items-center justify-center gap-4">
        <div class="w-12 h-12 border-4 border-t-yellow-500 border-white/10 rounded-full animate-spin"></div>
        <p class="text-xs uppercase tracking-widest text-yellow-500 font-bold" id="loadingText">Connecting to Server...</p>
    </div>

    <!-- Auth Container (Login / Register) -->
    <div id="authScreen" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-[#111827] border border-white/5 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h1 class="text-2xl font-black text-center text-white uppercase tracking-wider mb-2">MetaTrade</h1>
            <p class="text-xs text-center text-yellow-500 font-bold uppercase tracking-widest mb-6" id="authSubtitle">Login to Account</p>
            
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Email Address" class="w-full bg-[#1a1f29] border border-white/10 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-sm">
                <input type="password" id="authPassword" placeholder="Password" class="w-full bg-[#1a1f29] border border-white/10 p-4 rounded-xl text-white outline-none focus:border-yellow-500 text-sm">
                
                <button onclick="handleAuth()" id="authBtn" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl uppercase tracking-wider text-sm transition hover:bg-yellow-400">Sign In</button>
                
                <p class="text-center text-xs text-gray-400 font-medium">
                    <span id="toggleText">Don't have an account?</span> 
                    <button onclick="toggleAuthMode()" id="toggleBtn" class="text-yellow-500 font-bold ml-1 hover:underline">Register</button>
                </p>
            </div>
        </div>
    </div>

    <!-- Main Trading Dashboard -->
    <div id="dashboardScreen" class="hidden p-4 md:p-8 max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <header class="flex justify-between items-center bg-[#111827] border border-white/5 p-5 rounded-2xl">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Welcome Trader</p>
                <h2 id="userDisplayEmail" class="text-sm font-bold text-white">loading...</h2>
            </div>
            <button onclick="logout()" class="text-xs bg-white/5 hover:bg-red-500/20 hover:text-red-400 text-gray-400 font-bold px-4 py-2 rounded-xl border border-white/5 transition">Logout</button>
        </header>

        <!-- Balance Card -->
        <div class="bg-gradient-to-br from-[#111827] to-[#161f30] border border-white/5 p-6 rounded-3xl flex justify-between items-center shadow-xl">
            <div>
                <p class="text-xs text-yellow-500 font-black uppercase tracking-wider mb-1">Available Balance</p>
                <h1 class="text-3xl font-black text-white" id="userBalance">$0.00</h1>
            </div>
            <button onclick="openDepositModal()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black text-xs px-5 py-3 rounded-xl uppercase tracking-wider transition shadow-lg shadow-yellow-500/10">Deposit</button>
        </div>

        <!-- Trade Control Station -->
        <div class="bg-[#111827] border border-white/5 p-6 rounded-3xl space-y-4">
            <h3 class="text-sm font-black text-white uppercase tracking-wider">Execute Fast Trade</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1">Amount ($)</label>
                    <input type="number" id="tradeAmount" value="10" class="w-full bg-[#1a1f29] border border-white/10 p-3.5 rounded-xl text-white font-bold outline-none focus:border-yellow-500 text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block mb-1">Duration</label>
                    <select class="w-full bg-[#1a1f29] border border-white/10 p-3.5 rounded-xl text-white font-bold outline-none text-sm">
                        <option>30 Seconds</option>
                        <option>60 Seconds</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="runTrade('High')" class="bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl uppercase tracking-wider text-xs transition">Call (High)</button>
                <button onclick="runTrade('Low')" class="bg-red-600 hover:bg-red-500 text-white font-black py-4 rounded-xl uppercase tracking-wider text-xs transition">Put (Low)</button>
            </div>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div id="depositModal" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#111827] border border-white/5 p-6 rounded-3xl w-full max-w-sm space-y-4 shadow-2xl relative">
            <button onclick="closeDepositModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white font-bold text-xl">&times;</button>
            <h2 class="text-lg font-black text-white uppercase tracking-wide">Deposit Funds</h2>
            <p class="text-xs text-gray-400 leading-relaxed">Send payment to Easypaisa/JazzCash account and paste details below. <br><span class="text-yellow-500 font-bold">Rate: 1$ = 280 PKR</span></p>
            
            <div class="space-y-3 pt-2">
                <input type="number" id="depAmount" placeholder="Amount in USD ($)" oninput="calcPkr(this.value)" class="w-full bg-[#1a1f29] border border-white/10 p-3.5 rounded-xl text-white outline-none text-sm">
                <p class="text-xs font-bold text-right text-gray-400">Total: <span class="text-green-400" id="pkrLabel">0</span> PKR</p>
                <input type="text" id="depName" placeholder="Your Account Name" class="w-full bg-[#1a1f29] border border-white/10 p-3.5 rounded-xl text-white outline-none text-sm">
                <input type="text" id="depTxid" placeholder="Transaction ID (TXID)" class="w-full bg-[#1a1f29] border border-white/10 p-3.5 rounded-xl text-white outline-none text-sm">
                <button onclick="submitDepositRequest()" class="w-full py-4 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl uppercase tracking-wider text-xs transition">Submit Request</button>
            </div>
        </div>
    </div>

    <script>
        // Realtime Database Config
        const firebaseConfig = {
            apiKey: "AIzaSyBTpV52GenXmth0Kh3JtdDMo7pULp2pTrI",
            authDomain: "meta-trade-globel.firebaseapp.com",
            databaseURL: "https://metatrade-11b1f-default-rtdb.firebaseio.com",
            projectId: "meta-trade-globel",
            storageBucket: "meta-trade-globel.firebasestorage.app",
            messagingSenderId: "1087236988664",
            appId: "1:1087236988664:web:1c47339c55b7957953a50d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let isSignUp = false;
        let currentUserUid = localStorage.getItem('traderUid') || null;

        // Session Check Initializer
        window.onload = function() {
            if(currentUserUid) {
                checkUserSession(currentUserUid);
            } else {
                showAuth();
            }
        };

        function showAuth() {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }

        function toggleAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('authSubtitle').innerText = isSignUp ? "Create New Account" : "Login to Account";
            document.getElementById('authBtn').innerText = isSignUp ? "Sign Up" : "Sign In";
            document.getElementById('toggleText').innerText = isSignUp ? "Already have an account?" : "Don't have an account?";
            document.getElementById('toggleBtn').innerText = isSignUp ? "Login" : "Register";
        }

        // Authentication Handler (Login/Register via RTDB)
        async function handleAuth() {
            const email = document.getElementById('authEmail').value.trim().toLowerCase();
            const password = document.getElementById('authPassword').value;

            if(!email || !password) return alert("Please fill all fields!");

            document.getElementById('loadingScreen').classList.remove('hidden');
            document.getElementById('loadingText').innerText = "Authenticating...";

            const cleanEmailKey = email.replace(/[.$#[\]]/g, "_"); // RTDB safe key conversion

            if(isSignUp) {
                // Check if user already exists
                const snap = await database.ref('users').orderByChild('email').equalTo(email).once('value');
                if(snap.exists()) {
                    showAuth();
                    return alert("Email already registered!");
                }

                // Create new user record
                const newUid = 'uid_' + Math.random().toString(36).substr(2, 9);
                const userData = {
                    uid: newUid,
                    email: email,
                    password: password,
                    balance: 0.00,
                    tradeMode: 'normal',
                    status: 'active'
                };

                await database.ref('users/' + newUid).set(userData);
                loginSuccess(newUid);
            } else {
                // Login check
                const snap = await database.ref('users').once('value');
                let foundUid = null;
                let isBlocked = false;

                snap.forEach(child => {
                    const u = child.val();
                    if(u.email === email && u.password === password) {
                        foundUid = child.key;
                        if(u.status === 'blocked') isBlocked = true;
                    }
                });

                if(isBlocked) {
                    showAuth();
                    return alert("This account is blocked by the Admin!");
                }

                if(foundUid) {
                    loginSuccess(foundUid);
                } else {
                    showAuth();
                    alert("Invalid Email or Password!");
                }
            }
        }

        function loginSuccess(uid) {
            localStorage.setItem('traderUid', uid);
            currentUserUid = uid;
            checkUserSession(uid);
        }

        // Live User Dashboard Session Sync
        function checkUserSession(uid) {
            document.getElementById('loadingScreen').classList.remove('hidden');
            
            database.ref('users/' + uid).on('value', snapshot => {
                const user = snapshot.val();
                if(!user) {
                    logout();
                    return;
                }

                if(user.status === 'blocked') {
                    alert("Your account has been blocked!");
                    logout();
                    return;
                }

                // Sync data directly to dashboard UI live
                document.getElementById('userDisplayEmail').innerText = user.email;
                document.getElementById('userBalance').innerText = "$" + parseFloat(user.balance || 0).toFixed(2);
                
                // Switch interface views smoothly
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('dashboardScreen').classList.remove('hidden');
            }, err => {
                logout();
            });
        }

        // Live Manual Deposit System Control
        function openDepositModal() { document.getElementById('depositModal').style.display = 'flex'; }
        function closeDepositModal() { document.getElementById('depositModal').style.display = 'none'; }
        function calcPkr(usd) { document.getElementById('pkrLabel').innerText = usd ? (parseFloat(usd) * 280).toLocaleString() : 0; }

        async function submitDepositRequest() {
            const amount = document.getElementById('depAmount').value;
            const name = document.getElementById('depName').value.trim();
            const txid = document.getElementById('depTxid').value.trim();
            const email = document.getElementById('userDisplayEmail').innerText;

            if(!amount || !name || !txid) return alert("Please fill out all receipt details!");

            const txnId = 'txn_' + Date.now();
            const pkrAmount = parseFloat(amount) * 280;

            const txnData = {
                uid: currentUserUid,
                user: email,
                type: 'Deposit',
                amount: parseFloat(amount),
                pkrAmount: pkrAmount,
                accountName: name,
                txid: txid,
                status: 'Pending',
                timestamp: new Date().toLocaleTimeString() + ' ' + new Date().toLocaleDateString()
            };

            await database.ref('transactions/' + txnId).set(txnData);
            alert("Deposit request submitted successfully! Waiting for Admin verification.");
            closeDepositModal();
        }

        // Simulation Trade Actions
        async function runTrade(direction) {
            const amtInput = document.getElementById('tradeAmount').value;
            const currentBalText = document.getElementById('userBalance').innerText.replace('$', '');
            let balance = parseFloat(currentBalText);
            const stake = parseFloat(amtInput);

            if(!stake || stake <= 0) return alert("Enter a valid stake amount!");
            if(balance < stake) return alert("Insufficient balance to place trade!");

            // Fetch absolute trade configuration mode directly from system database live
            const snapshot = await database.ref('users/' + currentUserUid).once('value');
            const user = snapshot.val();
            const mode = user.tradeMode || 'normal';

            document.getElementById('loadingScreen').classList.remove('hidden');
            document.getElementById('loadingText').innerText = "Trade Executing... (" + direction + ")";

            setTimeout(async () => {
                let win = false;
                if(mode === 'profit') win = true;
                else if(mode === 'loss') win = false;
                else win = Math.random() > 0.5; // 50/50 algorithm calculation

                if(win) {
                    const winAmt = stake * 0.85; // 85% payout return matrix
                    await database.ref('users/' + currentUserUid).update({ balance: balance + winAmt });
                    alert("🎯 Trade WIN! Profit: +$" + winAmt.toFixed(2));
                } else {
                    await database.ref('users/' + currentUserUid).update({ balance: balance - stake });
                    alert("❌ Trade LOSS! Loss: -$" + stake.toFixed(2));
                }
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 3000); // Fast execution speed time loop simulation
        }

        function logout() {
            localStorage.clear();
            currentUserUid = null;
            location.reload();
        }
    </script>
</body>
</html>
